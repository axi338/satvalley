services:
  - type: web
    name: satvalley-backend
    env: docker
    plan: free # or your preferred plan
    region: oregon # or your preferred region
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: PORT
        value: 8080
